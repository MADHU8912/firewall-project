name: Firewall Build Deploy

on:
  push:
    branches:
      - main

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Project
        run: echo "Build Successful"

  report-of-build:
    name: Report of Build
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Build Report
        run: echo "Firewall Project Build Completed"

  deploy:
    name: Deploy
    needs: report-of-build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Report
        run: echo "Deploy Completed"
